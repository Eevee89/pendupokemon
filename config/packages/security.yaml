security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    password_hashers:
        App\Entity\User: 'auto'

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|icons)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
                target: app_main
